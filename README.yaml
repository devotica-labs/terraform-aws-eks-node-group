description: |-
  Terraform module to provision an EKS **managed node group** of worker nodes
  for an existing EKS cluster — with a hardened launch template (encrypted EBS,
  IMDSv2), an IAM role wired for SSM (no SSH), Graviton defaults, taints/labels,
  and rolling updates. Instantiate it multiple times for different instance
  classes, capacity types, or workloads.

introduction: |-
  This module creates an [EKS managed node group](https://docs.aws.amazon.com/eks/latest/userguide/managed-node-groups.html)
  for a cluster created by `terraform-aws-eks-cluster`. It always uses a launch
  template so it can enforce a fintech-safe instance posture (encrypted root
  volume, required IMDSv2 with a hop limit that keeps pods off the instance
  metadata endpoint, detailed monitoring). EKS still selects the AMI for the
  chosen `ami_type` + Kubernetes version and supplies the bootstrap userdata.

usage: |-
  See [`examples/complete`](examples/complete) for the full surface and
  [`examples/basic`](examples/basic) for a minimal node group.

